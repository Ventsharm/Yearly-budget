<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Yearly budget</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>*{box-sizing:border-box}html,body{margin:0;padding:0;font-family:Inter,system-ui,sans-serif;background:#050505;color:#fff}body{min-height:100vh;background:radial-gradient(circle at top,#1a1a1a 0%,#0b0b0b 35%,#000 100%)}.wrap{max-width:520px;margin:0 auto;min-height:100vh;padding:22px 16px 40px}.card{background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.08);border-radius:28px;box-shadow:0 10px 35px rgba(0,0,0,.45)}.hero{padding:22px 18px 18px;margin-bottom:16px;position:relative;overflow:hidden}.hero:before{content:"";position:absolute;inset:auto -60px -60px auto;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.12),transparent 65%)}h1{margin:0;font-size:30px;font-weight:800}.sub{margin:8px 0 0;color:rgba(255,255,255,.7)}.auth,.app{padding:16px}.row{display:flex;gap:10px}.row>*{flex:1}label{font-size:13px;font-weight:600}input,select{width:100%;border:none;border-radius:16px;padding:12px;background:rgba(255,255,255,.08);color:#fff}.btn{border:none;border-radius:16px;padding:12px;font-weight:700;cursor:pointer}.btn-primary{background:#fff;color:#000}.btn-secondary{background:rgba(255,255,255,.1);color:#fff}.btn-danger{background:rgba(255,255,255,.1);color:#fff}.hidden{display:none}.save-total{font-size:32px;font-weight:800}</style></head><body><div class="wrap"><div class="card hero"><h1>Yearly budget</h1><p class="sub">Track yearly subscriptions by month</p></div><div id="authCard" class="card auth"><button id="showLogin">Login</button><button id="showRegister">Register</button><div id="loginBox"><input id="loginEmail" placeholder="Email"><input id="loginPassword" type="password" placeholder="Password"><button id="loginBtn" class="btn btn-primary">Login</button><div id="loginStatus"></div></div><div id="registerBox" class="hidden"><input id="registerEmail" placeholder="Email"><input id="registerPassword" type="password" placeholder="Password"><button id="registerBtn" class="btn btn-primary">Create account</button><div id="registerStatus"></div></div></div>

<div id="appCard" class="card app hidden"><div>Signed in as <span id="userEmail"></span><button id="logoutBtn">Logout</button></div><div>Save: <span id="saveTotal">£0.00</span></div><input id="subName" placeholder="Subscription name"><input id="subAmount" type="number" placeholder="Amount"><select id="subMonth"><option>January</option><option>February</option><option>March</option><option>April</option><option>May</option><option>June</option><option>July</option><option>August</option><option>September</option><option>October</option><option>November</option><option>December</option></select><button id="addBtn">Add</button><div id="subsList"></div><div id="appStatus"></div></div><script type="module">import{initializeApp}from"https://www.gstatic.com/firebasejs/12.4.0/firebase-app.js";import{getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/12.4.0/firebase-auth.js";import{getFirestore,collection,addDoc,onSnapshot,deleteDoc,doc}from"https://www.gstatic.com/firebasejs/12.4.0/firebase-firestore.js";const firebaseConfig={apiKey:"AIzaSyD4gZYEI2SxZCKQ32bKHV8RlPiLv-zpHrU",authDomain:"yearly-budget-c93fb.firebaseapp.com",projectId:"yearly-budget-c93fb",storageBucket:"yearly-budget-c93fb.firebasestorage.app",messagingSenderId:"415123329669",appId:"1:415123329669:web:76ab11fe58563197c9cfec"};const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app);let user=null;const loginBtn=document.getElementById("loginBtn"),registerBtn=document.getElementById("registerBtn"),logoutBtn=document.getElementById("logoutBtn");const loginEmail=document.getElementById("loginEmail"),loginPassword=document.getElementById("loginPassword"),registerEmail=document.getElementById("registerEmail"),registerPassword=document.getElementById("registerPassword");const authCard=document.getElementById("authCard"),appCard=document.getElementById("appCard"),userEmail=document.getElementById("userEmail");const addBtn=document.getElementById("addBtn"),subName=document.getElementById("subName"),subAmount=document.getElementById("subAmount"),subMonth=document.getElementById("subMonth"),subsList=document.getElementById("subsList"),saveTotal=document.getElementById("saveTotal");registerBtn.onclick=()=>createUserWithEmailAndPassword(auth,registerEmail.value,registerPassword.value);loginBtn.onclick=()=>signInWithEmailAndPassword(auth,loginEmail.value,loginPassword.value);logoutBtn.onclick=()=>signOut(auth);onAuthStateChanged(auth,u=>{user=u;if(u){authCard.classList.add("hidden");appCard.classList.remove("hidden");userEmail.textContent=u.email;load()}else{authCard.classList.remove("hidden");appCard.classList.add("hidden")}});function load(){onSnapshot(collection(db,"users",user.uid,"yearlySubscriptions"),snap=>{let total=0,html="";snap.forEach(d=>{const i=d.data();total+=Number(i.amount)||0;html+=`<div>${i.name} (${i.month}) £${i.amount} <button onclick="del('${d.id}')">X</button></div>`});subsList.innerHTML=html;saveTotal.textContent="£"+total.toFixed(2)})}addBtn.onclick=()=>addDoc(collection(db,"users",user.uid,"yearlySubscriptions"),{name:subName.value,amount:Number(subAmount.value),month:subMonth.value});window.del=id=>deleteDoc(doc(db,"users",user.uid,"yearlySubscriptions",id));</script></body></html>
