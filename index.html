<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Yearly budget</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>*{box-sizing:border-box}html,body{margin:0;padding:0;font-family:Inter,system-ui,sans-serif;background:#d9d9d9;color:#111}body{min-height:100vh;background:linear-gradient(180deg,#ececec 0%,#d7d7d7 40%,#cfcfcf 100%)}.wrap{max-width:520px;margin:0 auto;min-height:100vh;padding:20px 16px 40px}.panel{background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(242,242,242,.9));border:1px solid rgba(255,255,255,.9);border-radius:30px;box-shadow:0 10px 28px rgba(0,0,0,.10),0 3px 10px rgba(0,0,0,.06),inset 0 1px 0 rgba(255,255,255,.95)}.hero{padding:24px 20px 20px;margin-bottom:16px;position:relative;overflow:hidden}.hero:before{content:"";position:absolute;right:-55px;top:-55px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.9),transparent 70%)}h1{margin:0;font-size:31px;line-height:1.02;font-weight:800;letter-spacing:-.03em;color:#181818}.sub{margin:10px 0 0;font-size:14px;line-height:1.45;color:#555}.card{padding:18px}.tabs{display:flex;gap:8px;background:#dcdcdc;padding:5px;border-radius:18px;margin-bottom:16px;box-shadow:inset 0 2px 6px rgba(0,0,0,.08),0 2px 4px rgba(255,255,255,.6)}.tab{flex:1;border:none;background:transparent;color:#666;padding:12px 10px;border-radius:14px;font-size:14px;font-weight:800;cursor:pointer}.tab.active{background:linear-gradient(180deg,#fff,#f1f1f1);color:#111;box-shadow:0 4px 12px rgba(0,0,0,.12),inset 0 1px 0 rgba(255,255,255,.9)}.field{margin-bottom:12px}.label{display:block;margin:0 0 7px;font-size:13px;font-weight:700;color:#333}input,select{width:100%;border:none;outline:none;background:#f5 </div></div><div id="appCard" class="panel card hidden"><div class="topbar"><div class="signed"><small>Signed in as</small><strong id="userEmail"></strong></div><button id="logoutBtn" class="btn btn-soft" type="button">Logout</button></div><div class="savebox"><div class="mini">Save:</div><div id="saveTotal" class="total">£0.00</div></div><div class="formcard"><div class="field"><label class="label" for="subName">Subscription name</label><input id="subName" type="text" placeholder="Example: Amazon Prime"></div><div class="row"><div class="field"><label class="label" for="subAmount">Amount (£)</label><input id="subAmount" type="number" min="0" step="0.01" placeholder="0.00"></div><div class="field"><label class="label" for="subMonth">Month</label><select id="subMonth"><option>January</option><option>February</option><option>March</option><option>April</option><option>May</option><option>June</option><option>July</option><option>August</option><option>September</option><option>October</option><option>November</option><option>December</option></select></div></div><button id="addBtn" class="btn btn-soft" type="button">Add subscription</button><div id="appStatus" class="status"></div></div><div id="subsList" class="list"><div class="empty">Your yearly subscriptions will appear here.</div></div></div><div class="footerpad"></div></div><script type="module">import{initializeApp}from"https://www.gstatic.com/firebasejs/12.4.0/firebase-app.js";import{getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,onAuthStateChanged,signOut,setPersistence,browserLocalPersistence}from"https://www.gstatic.com/firebasejs/12.4.0/firebase-auth.js";import{getFirestore,collection,addDoc,deleteDoc,doc,onSnapshot,query}from"https://www.gstatic.com/firebasejs/12.4.0/firebase-firestore.js";const firebaseConfig={apiKey:"AIzaSyD4gZYEI2SxZCKQ32bKHV8RlPiLv-zpHrU",authDomain:"yearly-budget-c93fb.firebaseapp.com",projectId:"yearly-budget-c93fb",storageBucket:"yearly-budget-c93fb.firebasestorage.app",messagingSenderId:"415123329669",appId:"1:415123329669:web:76ab11fe58563197c9cfec"};const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app);setPersistence(auth,browserLocalPersistence).catch(()=>{});const showLogin=document.getElementById("showLogin"),showRegister=document.getElementById("showRegister"),loginBox=document.getElementById("loginBox"),registerBox=document.getElementById("registerBox"),loginEmail=document.getElementById("loginEmail"),loginPassword=document.getElementById("loginPassword"),registerEmail=document.getElementById("registerEmail"),registerPassword=document.getElementById("registerPassword"),loginBtn=document.getElementById("loginBtn"),registerBtn=document.getElementById("registerBtn"),loginStatus=document.getElementById("loginStatus"),registerStatus=document.getElementById("registerStatus"),authCard=document.getElementById("authCard"),appCard=document.getElementById("appCard"),userEmail=document.getElementById("userEmail"),logoutBtn=document.getElementById("logoutBtn"),subName=document.getElementById("subName"),subAmount=document.getElementById("subAmount"),subMonth=document.getElementById("subMonth"),addBtn=document.getElementById("addBtn"),appStatus=document.getElementById("appStatus"),subsList=document.getElementById("subsList"),saveTotal=document.getElementById("saveTotal");let currentUser=null,unsub=null,items=[];const months=["January","February","March","April","May","June","July","August","September","October","November","December"],monthIndex=m=>months.indexOf(m),money=n=>"£"+(Number(n)||0).toFixed(2),esc=s=>String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));function setMode(mode){if(mode==="login"){showLogin.classList.add("active");showRegister.classList.remove("active");loginBox.classList.remove("hidden");registerBox.classList.add("hidden")}else{showRegister.classList.add("active");showLogin.classList.remove("active");registerBox.classList.remove("hidden");loginBox.classList.add("hidden")}loginStatus.textContent="";registerStatus.textContent=""}function resetForm(){subName.value="";subAmount.value="";subMonth.value="January"}function render(){const sorted=[...items].sort((a,b)=>monthIndex(a.month)-monthIndex(b.month)||a.name.localeCompare(b.name));const total=sorted.reduce((sum,item)=>sum+(Number(item.amount)||0),0);saveTotal.textContent=money(total);if(!sorted.length){subsList.innerHTML='<div class="empty">Your yearly subscriptions will appear here.</div>';return}subsList.innerHTML=sorted.map(item=>'<div class="item"><div class="itemleft"><div class="itemtitle">'+esc(item.name)+'</div><div class="itemmeta">'+esc(item.month)+'</div></div><div class="itemright"><div class="amt">'+money(item.amount)+'</div><button class="btn-del del-btn" data-id="'+esc(item.id)+'" type="button">Delete</button></div></div>').join("")}function startListener(uid){if(unsub){unsub();unsub=null}unsub=onSnapshot(query(collection(db,"users",uid,"yearlySubscriptions")),snap=>{items=snap.docs.map(d=>({id:d.id,...d.data()}));render()},err=>{appStatus.textContent=err.message||"Could not load your subscriptions."})}function loginMessage(code){if(code==="auth/user-not-found")return"Please sign up.";if(code==="auth/invalid-credential")return"Please sign up or check your password.";if(code==="auth/invalid-email")return"Enter a valid email.";if(code==="auth/missing-password")return"Enter your password.";if(code==="auth/too-many-requests")return"Too many attempts. Try again later.";return"Login failed."}function registerMessage(code){if(code==="auth/email-already-in-use")return"Please login.";if(code==="auth/invalid-email")return"Enter a valid email.";if(code==="auth/weak-password")return"Password must be at least 6 characters.";return"Could not create account."}showLogin.onclick=()=>setMode("login");showRegister.onclick=()=>setMode("register");registerBtn.onclick=async()=>{const email=registerEmail.value.trim(),password=registerPassword.value.tri s",btn.dataset.id));appStatus.textContent="Subscription deleted."}catch(err){appStatus.textContent=err.message||"Could not delete subscription."}});onAuthStateChanged(auth,user=>{currentUser=user||null;if(user){authCard.classList.add("hidden");appCard.classList.remove("hidden");userEmail.textContent=user.email||"";items=[];render();startListener(user.uid);appStatus.textContent=""}else{if(unsub){unsub();unsub=null}items=[];render();authCard.classList.remove("hidden");appCard.classList.add("hidden");userEmail.textContent="";appStatus.textContent=""}});</script></body></html><div id="appCard" class="card app hidden"><div>Signed in as <span id="userEmail"></span><button id="logoutBtn">Logout</button></div><div>Save: <span id="saveTotal">£0.00</span></div><input id="subName" placeholder="Subscription name"><input id="subAmount" type="number" placeholder="Amount"><select id="subMonth"><option>January</option><option>February</option><option>March</option><option>April</option><option>May</option><option>June</option><option>July</option><option>August</option><option>September</option><option>October</option><option>November</option><option>December</option></select><button id="addBtn">Add</button><div id="subsList"></div><div id="appStatus"></div></div><script type="module">import{initializeApp}from"https://www.gstatic.com/firebasejs/12.4.0/firebase-app.js";import{getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/12.4.0/firebase-auth.js";import{getFirestore,collection,addDoc,onSnapshot,deleteDoc,doc}from"https://www.gstatic.com/firebasejs/12.4.0/firebase-firestore.js";const firebaseConfig={apiKey:"AIzaSyD4gZYEI2SxZCKQ32bKHV8RlPiLv-zpHrU",authDomain:"yearly-budget-c93fb.firebaseapp.com",projectId:"yearly-budget-c93fb",storageBucket:"yearly-budget-c93fb.firebasestorage.app",messagingSenderId:"415123329669",appId:"1:415123329669:web:76ab11fe58563197c9cfec"};const app=initializeApp(firebaseCon
